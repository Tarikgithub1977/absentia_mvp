<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants et Professeurs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .section {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
        }
        button, input, select {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Gestion des Étudiants</h1>
    <div class="section">
        <h2>Liste des Étudiants</h2>
        <div id="students-list"></div>
        <form id="add-student-form">
            <input type="text" id="student-name" placeholder="Nom de l'étudiant" required>
            <button type="submit">Ajouter Étudiant</button>
        </form>
    </div>

    <h1>Gestion des Professeurs</h1>
    <div class="section">
        <h2>Liste des Professeurs</h2>
        <div id="teachers-list"></div>
        <form id="add-teacher-form">
            <input type="text" id="teacher-name" placeholder="Nom du professeur" required>
            <button type="submit">Ajouter Professeur</button>
        </form>
    </div>

    <h1>Gestion des Modules</h1>
    <div class="section">
        <h2>Liste des Modules</h2>
        <div id="modules-list"></div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
